name: Build Custom Spider
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Add execute permission to gradlew
        run: chmod +x gradlew

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Download and extract Apktool
        run: |
          mkdir -p 3rd
          wget https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.11.0.jar -O 3rd/apktool_2.11.0.jar

      - name: Build APK
        run: |
          ./gradlew assembleRelease

      - name: Clean up previous build artifacts
        run: |
          rm -f custom_spider.jar
          rm -rf spider.jar

      - name: Decode APK
        run: |
          java -jar 3rd/apktool_2.11.0.jar d -f --only-main-classes ./app/build/outputs/apk/release/app-release-unsigned.apk -o spider.jar

      - name: List source directories
        run: |
          ls -l spider.jar/smali/com/github/catvod/spider
          ls -l spider.jar/smali/com/github/catvod/js
          ls -l spider.jar/smali/org/slf4j

      - name: Move smali files
        run: |
          mv spider.jar/smali/com/github/catvod/spider spider.jar/smali/com/github/catvod/spider_new
          mv spider.jar/smali/com/github/catvod/js spider.jar/smali/com/github/catvod/js_new
          mv spider.jar/smali/org/slf4j spider.jar/smali/org/slf4j_new

      - name: Build JAR
        run: |
          java -jar 3rd/apktool_2.11.0.jar b spider.jar -c

      - name: Rename and generate MD5
        run: |
          mv spider.jar/dist/dex.jar custom_spider.jar
          md5sum custom_spider.jar | cut -d ' ' -f 1 > custom_spider.jar.md5

      - name: Clean up temporary files
        run: |
          rm -rf spider.jar/build
          rm -rf spider.jar/smali
          rm -rf spider.jar/dist

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: custom_spider
          path: |
            custom_spider.jar
            custom_spider.jar.md5
