name: Build Custom Spider
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Add execute permission to gradlew
        run: chmod +x gradlew

      - name: Set up JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y unzip

      - name: Download and extract Apktool
        run: |
          mkdir -p 3rd
          wget https://bitbucket.org/iBotPeaches/apktool/downloads/apktool_2.11.0.jar -O 3rd/apktool_2.11.0.jar

      - name: Build APK
        run: |
          ./gradlew assembleRelease

      - name: Clean up previous build artifacts
        run: |
          rm -f custom_spider.jar
          rm -rf spider.jar

      - name: Decode APK
        run: |
          java -jar 3rd/apktool_2.11.0.jar d -f --only-main-classes ./app/build/outputs/apk/release/app-release-unsigned.apk -o Smali_classes

      - name: List source directories
        run: |
          ls -l Smali_classes/smali/com/github/catvod/spider
          ls -l Smali_classes/smali/com/github/catvod/js
          ls -l Smali_classes/smali/org/slf4j

      - name: Move smali files
        run: |
          mkdir -p spider.jar/smali/com/github/catvod
          mkdir -p spider.jar/smali/org/slf4j
          mv Smali_classes/smali/com/github/catvod/spider spider.jar/smali/com/github/catvod/spider
          mv Smali_classes/smali/com/github/catvod/js spider.jar/smali/com/github/catvod/js
          mv Smali_classes/apktool.yml spider.jar/
          mv Smali_classes/smali/org/slf4j spider.jar/smali/org/slf4j

      - name: Build JAR
        run: |
          java -jar 3rd/apktool_2.11.0.jar b spider.jar -c

      - name: Rename and generate MD5
        run: |
          mv spider.jar/dist/app-release-unsigned.apk jar/custom_spider.jar
          md5sum custom_spider.jar | cut -d ' ' -f 1 > jar/custom_spider.jar.md5

      - name: Clean up temporary files
        run: |
          ls -l
          rm -rf spider.jar/build
          rm -rf spider.jar/smali
          rm -rf spider.jar/dist

      - name: Upload APK
        uses: actions/upload-pages-artifact@v3
        with:
          name: Spider
          path: ./jar/
      - name: Update spider jar
        uses: EndBug/add-and-commit@v9.1.3
        with:
          default_author: github_actions
          message: 'update spider jar'
          add: "['./jar/xiaoya_proxy.jar', './jar/xiaoya_proxy.jar.md5']"
